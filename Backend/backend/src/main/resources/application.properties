spring.application.name=hospital-appointment-system

server.port=8080

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Darshan@44
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# Load data.sql on startup
spring.sql.init.mode=always

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=darshanarun68@gmail.com
spring.mail.password=lpplvgjqdmzledey
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
jwt.secret=mysecretkeymysecretkeymysecretkey12345

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.h2.console.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# ========== PHASE 2: PERFORMANCE OPTIMIZATION ==========

# Response Compression (Gzip)
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# Batch Processing & Query Optimization
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Query Timeout (seconds)
spring.jpa.properties.hibernate.query.timeout=30

# Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Actuator Endpoints for Monitoring (Phase 2)
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.endpoint.health.show-details=always

# Additional Actuator Configuration
management.endpoints.web.base-path=/actuator
management.endpoint.health.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# Detailed Health Metrics
management.health.db.enabled=true
management.health.diskspace.enabled=true

# Micrometer Prometheus Metrics
management.metrics.export.prometheus.enabled=true

# Performance Monitoring Interval (collect metrics every 60 seconds)
management.metrics.export.simple.step=1m

# Tag for identifying application in metrics
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=development